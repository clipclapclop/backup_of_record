name: backup_of_record
description: "Back up phone content to a NAS via WebDAV."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Secure credential storage
  flutter_secure_storage: ^9.2.2

  # Background execution
  workmanager: ^0.9.0
  flutter_foreground_task: ^8.13.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # File system
  file_picker: ^8.1.3
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking
  http: ^1.2.2

  # Crypto / hashing
  crypto: ^3.0.5

  # Compression
  archive: ^3.6.1

  # Date formatting
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
